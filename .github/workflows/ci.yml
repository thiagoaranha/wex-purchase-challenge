name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://wex_user:wex_password@localhost:5432/wex_test_db?schema=public
      NODE_ENV: test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wex_user
          POSTGRES_PASSWORD: wex_password
          POSTGRES_DB: wex_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wex_user -d wex_test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm run prisma:generate

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Prisma migrate deploy
        run: pnpm run prisma:migrate:deploy

      - name: Unit tests with coverage
        run: pnpm run test:cov

      - name: Integration tests
        run: pnpm run test:integration

      - name: E2E tests
        run: pnpm run test:e2e

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
